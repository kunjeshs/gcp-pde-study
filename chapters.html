<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#0e1114">
  <title>Chapters · GCP PDE Study Hub</title>
  <link rel="stylesheet" href="assets/css/app.css?v=9">
  <link rel="stylesheet" href="assets/css/redesign.css?v=9">
  <link rel="stylesheet" href="assets/css/theme-toggle.css?v=9">
  <link rel="stylesheet" href="assets/css/overrides.css?v=9">
</head>
<body>
  <div class="page">
    <header class="topbar" data-appbar></header>
    <main class="pde-wrap">
      <p class="eyebrow">Contents</p>
      <h1>All chapters</h1>
      <p class="lead">19 sections from the official exam guide. Tap to read what the exam tests, must-know services, gotchas, and decision tables.</p>
      <div id="list" class="pde-cards" style="margin-top:18px"></div>
    </main>
  </div>
  <script type="module">
    import { boot } from "./assets/js/app.js";
    import { Data } from "./assets/js/data.js";
    const esc = (s) => (s||"").toString().replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    if (boot()) {
      Promise.all([Data.chapters(), Data.topicsManifest()]).then(([d, tm]) => {
        const list = document.getElementById("list");
        const byTitle = d.chapters || {};
        list.innerHTML = (tm.topics || []).map((t) => {
          const ch = byTitle[t.topic] || {};
          const summary = (ch.what_the_exam_tests || "").slice(0, 140);
          return `
            <div class="pde-card">
              <h3>${esc(t.topic)}</h3>
              <p class="pde-card-meta">${ch.exam_weight ? esc(ch.exam_weight) + " weight · " : ""}${t.question_count || 0} question${t.question_count === 1 ? "" : "s"}</p>
              ${summary ? `<p class="pde-card-meta">${esc(summary)}${summary.length === 140 ? "…" : ""}</p>` : ""}
              <a href="chapter.html?slug=${encodeURIComponent(t.slug)}">Open →</a>
            </div>`;
        }).join("");
      });
    }
  </script>
</body>
</html>
