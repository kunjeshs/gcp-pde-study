<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#0b0f17">
  <title>Services · GCP PDE Study Hub</title>
  <link rel="stylesheet" href="assets/css/app.css?v=3">
  <link rel="stylesheet" href="assets/css/overrides.css?v=3">
</head>
<body>
  <div class="page">
    <header class="topbar" data-appbar></header>
    <main class="content">
      <p class="eyebrow">Reference</p>
      <h1>GCP services</h1>
      <p class="lead">46 services by category with decision hints.</p>
      <div class="row field-group" style="margin:18px 0">
        <input id="q" type="search" placeholder="Search service / use-case…" style="flex:1">
      </div>
      <div id="list"></div>
    </main>
  </div>
  <script type="module">
    import { boot } from "./assets/js/app.js";
    import { Data } from "./assets/js/data.js";

    const esc = (s) => (s||"").toString().replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");

    const CAT_LABELS = {
      storage: "Storage",
      processing: "Processing",
      orchestration: "Orchestration",
      ml_ai: "ML / AI",
      governance: "Governance",
      operations: "Operations",
      infrastructure: "Infrastructure",
      cases: "Use cases",
    };
    const KEY_LABELS = {
      id: "ID", url: "Docs", type: "Type", managed: "Managed", scaling: "Scaling",
      pde_snippet: "Exam snippet", best_for: "Best for", details: "Details",
      tags: "Tags", os_equiv: "OSS equivalent", coding: "Coding", iam: "IAM",
      availability: "Availability", cost: "Cost", trouble: "Troubleshoot",
    };
    const fmtKey = (k) => KEY_LABELS[k] || (k.charAt(0).toUpperCase() + k.slice(1).replace(/_/g, " "));

    if (boot()) {
      const d = await Data.services();
      const list = document.getElementById("list");
      const q = document.getElementById("q");

      function render() {
        const term = (q.value || "").toLowerCase().trim();
        const html = Object.entries(d.services).map(([cat, items]) => {
          const filtered = items.filter((s) => {
            if (!term) return true;
            return JSON.stringify(s).toLowerCase().includes(term);
          });
          if (!filtered.length) return "";
          const catLabel = CAT_LABELS[cat] || (cat.charAt(0).toUpperCase() + cat.slice(1).replace(/_/g, " / "));
          return `
            <section class="section">
              <div class="section-header"><h2>${esc(catLabel)}</h2></div>
              <div class="stack">
                ${filtered.map((s) => {
                  const meta = s.purpose || s.summary || s.description || s.best_for || s.pde_snippet || s.type || "";
                  const sub = (s.type || s.managed) ? `<p class="card-meta" style="font-size:.72rem;color:var(--text-faint);margin-top:2px">${esc([s.type, s.managed].filter(Boolean).join(" · "))}</p>` : "";
                  return `
                  <details class="card">
                    <summary>
                      <p class="card-title" style="margin-top:4px;color:var(--text)">${esc(s.name || s.service || "?")}</p>
                      ${sub}
                      <p class="card-meta">${esc(meta).slice(0, 220)}${meta.length > 220 ? "…" : ""}</p>
                    </summary>
                    <div class="body" style="overflow-x:auto;margin-top:10px">${renderObj(s)}</div>
                  </details>`;
                }).join("")}
              </div>
            </section>`;
        }).join("");
        list.innerHTML = html || `<div class="empty"><div class="big">∅</div>No matches.</div>`;
      }

      function renderObj(o) {
        const skip = new Set(["id","name","service","summary","purpose","description"]);
        const renderVal = (v) => {
          if (v == null || v === "") return "";
          if (Array.isArray(v)) {
            return `<div class="tag-row">${v.map((x) => typeof x === "string" ? `<span class="tag">${esc(x)}</span>` : `<span class="tag">${esc(JSON.stringify(x))}</span>`).join(" ")}</div>`;
          }
          if (typeof v === "object") {
            const sub = Object.entries(v).map(([k, vv]) => `<tr><th>${esc(fmtKey(k))}</th><td>${esc(vv)}</td></tr>`).join("");
            return `<table class="simple sub"><tbody>${sub}</tbody></table>`;
          }
          if (typeof v === "string" && /^https?:\/\//.test(v)) {
            return `<a href="${esc(v)}" target="_blank" rel="noopener">${esc(v)}</a>`;
          }
          return esc(v);
        };
        const rows = Object.entries(o).filter(([k]) => !skip.has(k)).map(([k, v]) => {
          return `<tr><th>${esc(fmtKey(k))}</th><td>${renderVal(v)}</td></tr>`;
        }).join("");
        return `<table class="simple"><tbody>${rows}</tbody></table>`;
      }

      let t; q.addEventListener("input", () => { clearTimeout(t); t = setTimeout(render, 150); });
      render();
    }
  </script>
</body>
</html>
