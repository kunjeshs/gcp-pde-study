<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#0b0f17">
  <title>Sign in · GCP PDE Study Hub</title>
  <link rel="stylesheet" href="assets/css/app.css?v=3">
  <link rel="stylesheet" href="assets/css/overrides.css?v=3">
</head>
<body>
  <div class="page">
    <main class="content login-wrap">
      <form class="login-card" id="login-form">
        <h1>GCP PDE Study Hub</h1>
        <p class="lead">Enter the access password.</p>
        <label for="pw">Password</label>
        <input id="pw" type="password" autocomplete="current-password" autofocus required>
        <div class="spacer"></div>
        <button class="button primary" type="submit" style="width:100%">Enter</button>
        <p id="err" class="err">Wrong password.</p>
        <p class="footer-note">Friction gate only — the code is public and the data is not secret.</p>
      </form>
    </main>
  </div>
  <script type="module">
    import { State } from "./assets/js/state.js";
    import { verifyPassword } from "./assets/js/app.js";

    // Apply saved theme so login matches the rest
    const t = State.getTheme() || "dark";
    document.documentElement.setAttribute("data-theme", t);

    const form = document.getElementById("login-form");
    const pw = document.getElementById("pw");
    const err = document.getElementById("err");

    if (State.isAuthed()) {
      const next = new URLSearchParams(location.search).get("next") || "index.html";
      location.replace(next);
    }
    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      err.style.display = "none";
      const ok = await verifyPassword(pw.value);
      if (!ok) { err.style.display = "block"; pw.select(); return; }
      State.setAuthed(true);
      const next = new URLSearchParams(location.search).get("next") || "index.html";
      location.replace(next);
    });
  </script>
</body>
</html>
