<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#0e1114">
  <title>Sign in · GCP PDE Study Hub</title>
  <link rel="stylesheet" href="assets/css/app.css?v=5">
  <link rel="stylesheet" href="assets/css/redesign.css?v=5">
  <link rel="stylesheet" href="assets/css/theme-toggle.css?v=5">
  <link rel="stylesheet" href="assets/css/overrides.css?v=5">
</head>
<body class="pde-redesign">
  <main class="pde-wrap">
    <form class="pde-login" id="login-form">
      <h1>GCP PDE Study Hub</h1>
      <p class="pde-login-tag">Enter the access password.</p>
      <label for="pw">Password</label>
      <input id="pw" type="password" autocomplete="current-password" autofocus required>
      <button class="pde-cta" type="submit">Enter</button>
      <p id="err" class="pde-err">Wrong password.</p>
      <p class="pde-foot">Friction gate only — the code is public and the data is not secret.</p>
    </form>
  </main>
  <script type="module">
    import { State } from "./assets/js/state.js";
    import { verifyPassword } from "./assets/js/app.js";

    // Apply saved theme so login matches the rest
    const t = State.getTheme() || "dark";
    document.documentElement.setAttribute("data-theme", t);

    const form = document.getElementById("login-form");
    const pw = document.getElementById("pw");
    const err = document.getElementById("err");

    if (State.isAuthed()) {
      const next = new URLSearchParams(location.search).get("next") || "index.html";
      location.replace(next);
    }
    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      err.classList.remove("is-on");
      const ok = await verifyPassword(pw.value);
      if (!ok) { err.classList.add("is-on"); pw.select(); return; }
      State.setAuthed(true);
      const next = new URLSearchParams(location.search).get("next") || "index.html";
      location.replace(next);
    });
  </script>
</body>
</html>
