<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#0e1114">
  <title>Question Bank · GCP PDE Study Hub</title>
  <link rel="stylesheet" href="assets/css/app.css?v=9">
  <link rel="stylesheet" href="assets/css/redesign.css?v=9">
  <link rel="stylesheet" href="assets/css/theme-toggle.css?v=9">
  <link rel="stylesheet" href="assets/css/overrides.css?v=9">
</head>
<body>
  <div class="page">
    <header class="topbar" data-appbar></header>
    <main class="pde-wrap">
      <p class="eyebrow">All questions</p>
      <h1>Question bank</h1>
      <p class="lead">All 592 questions. Filter by chapter, search the text, expand for answer + how-to-think.</p>

      <div class="row field-group" style="margin:14px 0">
        <input id="search" type="search" placeholder="Search question text…" style="flex:2;min-width:200px">
        <select id="topic-filter" style="flex:1;min-width:160px">
          <option value="">All chapters</option>
        </select>
      </div>
      <div id="list" class="stack"></div>
    </main>
  </div>
  <script type="module">
    import { boot, md } from "./assets/js/app.js";
    import { Data } from "./assets/js/data.js";
    import { State } from "./assets/js/state.js";

    const LETTERS = ["A","B","C","D","E","F"];
    const esc = (s) => (s||"").toString().replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");

    if (boot()) {
      const list = document.getElementById("list");
      const search = document.getElementById("search");
      const tf = document.getElementById("topic-filter");
      const footer = document.createElement("div");
      list.after(footer);

      const PAGE = 25;       // render in chunks so the page stays light on mobile
      let shown = PAGE;

      const [tm, all, explanations] = await Promise.all([
        Data.topicsManifest(),
        Data.allQuestions(),
        Data.explanations().catch(() => ({})),
      ]);

      tm.topics.forEach((t) => {
        const o = document.createElement("option");
        o.value = t.slug; o.textContent = `${t.topic} (${t.question_count})`;
        tf.appendChild(o);
      });

      function cardHtml(qq) {
        // answer is an array of correct option texts (1 or more).
        const ans = Array.isArray(qq.answer) ? qq.answer : (qq.answer != null ? [qq.answer] : []);
        const correctSet = new Set();
        (qq.options || []).forEach((o, i) => {
          if (ans.some((a) => (a || "").trim() === (o || "").trim())) correctSet.add(i);
        });
        const htt = explanations?.[qq.id]?.how_to_think?.markdown;
        const flagged = State.isFlagged(qq.id);
        return `
            <details class="card">
              <summary>
                <div class="card-top">
                  <span class="badge">${esc(qq.topic || "")}</span>
                  ${qq.source ? `<span class="badge">${esc(qq.source)}</span>` : ""}
                  ${correctSet.size > 1 ? `<span class="badge">select ${correctSet.size}</span>` : ""}
                  ${htt ? `<span class="badge status-live">how-to-think</span>` : ""}
                  ${flagged ? `<span class="badge status-offline">⚑ flagged</span>` : ""}
                </div>
                <span class="title">${esc(qq.question || "")}</span>
              </summary>
              <div class="body">
                <div class="opt-list">
                  ${(qq.options || []).map((o, oi) => `
                    <div class="opt ${correctSet.has(oi) ? "correct" : ""}">
                      <span class="letter">${LETTERS[oi]}.</span>
                      <span>${esc(o)}</span>
                    </div>`).join("")}
                </div>
                ${qq.explanation ? `<div class="explain"><h3>Explanation</h3><div class="md">${md(qq.explanation)}</div></div>` : ""}
                ${htt ? `<div class="explain"><h3>How to think</h3><div class="md">${md(htt)}</div></div>` : ""}
                <p style="margin-top:14px"><a class="button" href="quiz.html?topic=${encodeURIComponent(qq.topicSlug)}">Drill this chapter →</a></p>
              </div>
            </details>`;
      }

      function filterAll() {
        const q = (search.value || "").toLowerCase().trim();
        const tslug = tf.value;
        return all.filter((x) => (!tslug || x.topicSlug === tslug) && (!q || (x.question || "").toLowerCase().includes(q)));
      }

      function renderFooter(filtered) {
        if (filtered.length > shown) {
          const next = Math.min(PAGE, filtered.length - shown);
          footer.innerHTML = `<div class="center" style="margin:18px 0 4px">
            <button class="button" id="load-more">Load ${next} more</button>
            <p class="muted" style="margin-top:8px"><small>Showing ${shown} of ${filtered.length}</small></p></div>`;
          footer.querySelector("#load-more").addEventListener("click", () => {
            const prev = shown;
            shown += PAGE;
            list.insertAdjacentHTML("beforeend", filtered.slice(prev, shown).map(cardHtml).join(""));
            renderFooter(filtered);
          });
        } else {
          footer.innerHTML = filtered.length > PAGE
            ? `<p class="muted center" style="margin:18px 0 4px"><small>Showing all ${filtered.length}</small></p>`
            : "";
        }
      }

      function render() {
        shown = PAGE;
        const filtered = filterAll();
        if (!filtered.length) {
          list.innerHTML = `<div class="empty"><div class="big">∅</div>No matches.</div>`;
          footer.innerHTML = "";
          return;
        }
        list.innerHTML = filtered.slice(0, shown).map(cardHtml).join("");
        renderFooter(filtered);
      }

      let timer; const debounce = (fn) => { clearTimeout(timer); timer = setTimeout(fn, 150); };
      search.addEventListener("input", () => debounce(render));
      tf.addEventListener("change", render);
      render();
    }
  </script>
</body>
</html>
