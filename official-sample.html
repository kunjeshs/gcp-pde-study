<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#0e1114">
  <title>Official Sample · GCP PDE Study Hub</title>
  <link rel="stylesheet" href="assets/css/app.css?v=14">
  <link rel="stylesheet" href="assets/css/redesign.css?v=14">
  <link rel="stylesheet" href="assets/css/theme-toggle.css?v=14">
  <link rel="stylesheet" href="assets/css/overrides.css?v=14">
  <style>
    .os-filters { display: flex; gap: 10px; flex-wrap: wrap; margin: 14px 0 22px; align-items: center; }
    .os-filters button { background: transparent; color: var(--pde-fg); border: 1px solid var(--pde-border); padding: 6px 12px; border-radius: 999px; font-size: 13px; cursor: pointer; }
    .os-filters button.active { background: var(--pde-accent); color: var(--pde-on-accent); border-color: var(--pde-accent); }
    .os-q { border: 1px solid var(--pde-border); border-radius: 14px; padding: 18px 20px; margin: 14px 0; background: var(--pde-panel); }
    .os-q h3 { margin: 8px 0 6px; font-size: 18px; line-height: 1.4; }
    .os-pill { display: inline-block; padding: 3px 10px; border-radius: 999px; border: 1px solid var(--pde-border); font-size: 12px; margin-right: 6px; }
    .os-pill.area { background: rgba(59,130,246,0.12); color: #1d6fd6; border-color: rgba(59,130,246,0.35); }
    .os-pill.answer { background: var(--pde-accent-soft); color: var(--pde-accent); border-color: var(--pde-accent); }
    .os-opts { margin: 14px 0; padding: 0; list-style: none; }
    .os-opt { padding: 10px 12px; border-radius: 8px; border: 1px solid var(--pde-border); margin-bottom: 6px; display: flex; gap: 10px; align-items: flex-start; }
    .os-opt .letter { font-weight: 700; min-width: 22px; }
    .os-opt.is-correct { background: rgba(34,197,94,0.10); border-color: rgba(34,197,94,0.4); }
    .os-tag { display: inline-block; font-size: 10px; padding: 1px 7px; border-radius: 999px; margin-left: 8px; vertical-align: middle; }
    .os-tag.correct { background: var(--pde-accent-soft); color: var(--pde-accent); }
    .os-think { margin-top: 14px; }
    .os-think summary { cursor: pointer; font-weight: 600; padding: 10px 12px; background: var(--pde-accent-soft); border-radius: 8px; border: 1px solid var(--pde-border); }
    .os-think[open] summary { border-bottom-left-radius: 0; border-bottom-right-radius: 0; }
    .os-think .body { border: 1px solid var(--pde-border); border-top: none; padding: 16px; border-bottom-left-radius: 8px; border-bottom-right-radius: 8px; background: var(--pde-panel); }
    .os-section { margin: 14px 0; }
    .os-section h4 { margin: 0 0 6px; font-size: 13px; text-transform: uppercase; letter-spacing: .05em; color: var(--pde-fg-muted); }
    .os-section p, .os-section li { line-height: 1.55; }
    .os-section.win { border-left: 3px solid var(--pde-accent); padding-left: 12px; background: var(--pde-accent-soft); border-radius: 0 6px 6px 0; padding: 12px 14px; }
    .os-section.win h4 { color: var(--pde-accent); }
    .os-elim { display: grid; grid-template-columns: 28px 1fr; gap: 6px 10px; margin: 8px 0; }
    .os-elim .let { font-weight: 700; }
    .os-clues { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }
    .os-clue { font-size: 11px; padding: 2px 8px; background: rgba(96,165,250,0.12); color: #1d6fd6; border-radius: 999px; border: 1px solid rgba(96,165,250,0.3); }
    .os-takeaways { background: var(--pde-panel); border: 1px solid var(--pde-border); border-radius: 14px; padding: 20px; margin-top: 26px; }
    .os-takeaways ol { padding-left: 20px; }
    .os-takeaways li { margin: 6px 0; line-height: 1.55; }
    /* Blue "area"/"clue" tags: darker for light bg, brighter for dark bg */
    html[data-theme="dark"] .os-pill.area,
    html[data-theme="dark"] .os-clue { color: #7cb3f5; }
  </style>
</head>
<body>
  <div class="page">
    <header class="topbar" data-appbar></header>
    <main class="pde-wrap">
      <div id="root"><p class="muted">Loading…</p></div>
    </main>
  </div>
  <script type="module">
    import { boot } from "./assets/js/app.js";
    const esc = (s) => (s == null ? "" : String(s)).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    const md = (s) => esc(s || "").replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>").replace(/\n\n/g, "<br><br>").replace(/\n/g, "<br>");

    if (boot()) {
      const root = document.getElementById("root");
      try {
        const res = await fetch("./assets/data/official-sample.json", { cache: "force-cache" });
        const d = await res.json();

        const initialQ = parseInt(new URLSearchParams(location.search).get("q") || "0", 10);
        const initialGroup = (new URLSearchParams(location.search).get("group") || "all").toLowerCase();

        const intro = `
          <p class="eyebrow">Google official sample</p>
          <h1 style="margin:6px 0 4px">${esc(d.title)}</h1>
          <p class="muted">${esc(d.source)}</p>
          <p style="margin-top:14px;line-height:1.55">Read each prompt, try to answer in your head, then expand <strong>How to think</strong> to compare your reasoning to the clue-words, elimination steps, and mental model behind the correct answer.</p>`;

        const groupOf = (q) => ((q.topic_area || "").split("·")[0] || "Other").trim();
        const groups = [...new Set(d.questions.map(groupOf))].sort();
        const filtersHtml = `
          <div class="os-filters">
            <strong style="margin-right:6px">Filter:</strong>
            <button data-group="all">All ${d.questions.length}</button>
            ${groups.map((g) => {
              const n = d.questions.filter((q) => groupOf(q) === g).length;
              return `<button data-group="${esc(g.toLowerCase())}">${esc(g)} (${n})</button>`;
            }).join("")}
            <a href="#takeaways" style="margin-left:auto;color:var(--pde-accent);font-size:13px;text-decoration:none">↓ Key takeaways</a>
          </div>`;

        const renderQ = (q) => {
          const correctSet = String(q.correct_answer || "").split(/[,\s]+/).filter(Boolean);
          const optsHtml = Object.entries(q.options || {}).map(([L, txt]) => {
            const correct = correctSet.includes(L);
            return `<li class="os-opt ${correct ? "is-correct" : ""}">
              <span class="letter">${esc(L)}.</span>
              <span>${esc(txt)}${correct ? '<span class="os-tag correct">correct</span>' : ""}</span>
            </li>`;
          }).join("");

          const clueWordsHtml = (q.clue_words || []).map((c) => `<span class="os-clue">${esc(c)}</span>`).join("");

          const elimHtml = q.elimination ? `
            <div class="os-section">
              <h4>Option-by-option elimination</h4>
              ${Object.entries(q.elimination).map(([L, t]) => `<div class="os-elim"><span class="let">${esc(L)}.</span><span>${md(t)}</span></div>`).join("")}
            </div>` : "";

          const thinkingHtml = `
            <details class="os-think">
              <summary>How to think · clue words · elimination · mental model</summary>
              <div class="body">
                ${clueWordsHtml ? `<div class="os-section"><h4>Clue words to underline</h4><div class="os-clues">${clueWordsHtml}</div></div>` : ""}
                ${q.what_is_tested ? `<div class="os-section"><h4>What's being tested</h4><p>${md(q.what_is_tested)}</p></div>` : ""}
                ${q.decision_pattern ? `<div class="os-section"><h4>Decision pattern</h4><p>${md(q.decision_pattern)}</p></div>` : ""}
                ${elimHtml}
                ${q.mental_model ? `<div class="os-section win"><h4>Mental model to lock in</h4><p>${md(q.mental_model)}</p></div>` : ""}
                ${q.exam_pattern ? `<div class="os-section"><h4>Exam pattern shortcut</h4><p>${md(q.exam_pattern)}</p></div>` : ""}
                ${q.watch_out_for ? `<div class="os-section"><h4>Watch out for</h4><p>${md(q.watch_out_for)}</p></div>` : ""}
              </div>
            </details>`;

          return `
            <article class="os-q" id="q${q.qid}" data-group="${esc(groupOf(q).toLowerCase())}">
              <div>
                <span class="os-pill area">Q${q.qid}</span>
                ${q.topic_area ? `<span class="os-pill area">${esc(q.topic_area)}</span>` : ""}
                <span class="os-pill answer">answer: ${esc(q.correct_answer)}</span>
              </div>
              <h3>${esc(q.question)}</h3>
              <ul class="os-opts">${optsHtml}</ul>
              ${thinkingHtml}
            </article>`;
        };

        const questionsHtml = `<div id="qlist">${d.questions.map(renderQ).join("")}</div>`;

        const takeawaysHtml = `
          <section class="os-takeaways" id="takeaways">
            <h2 style="margin-top:0">Key takeaways across all ${d.questions.length} questions</h2>
            <ol>${(d.key_takeaways || []).map((t) => `<li>${md(t)}</li>`).join("")}</ol>
            <p style="margin-top:18px"><a class="pde-cta" href="chapters.html">All chapters →</a> <a class="pde-cta" href="exam-traps.html" style="background:transparent;color:var(--pde-accent);border:1px solid var(--pde-accent);margin-left:6px">Exam traps →</a></p>
          </section>`;

        root.innerHTML = intro + filtersHtml + questionsHtml + takeawaysHtml;

        const applyFilter = (group) => {
          root.querySelectorAll(".os-q").forEach((c) => {
            const show = group === "all" || c.dataset.group === group;
            c.style.display = show ? "" : "none";
          });
          root.querySelectorAll(".os-filters button").forEach((b) => b.classList.toggle("active", b.dataset.group === group));
          try {
            const u = new URL(location.href);
            u.searchParams.set("group", group);
            history.replaceState(null, "", u.toString());
          } catch (_e) {}
        };
        root.querySelectorAll(".os-filters button").forEach((b) => {
          b.addEventListener("click", () => applyFilter(b.dataset.group));
        });
        const validGroups = ["all", ...groups.map((g) => g.toLowerCase())];
        applyFilter(validGroups.includes(initialGroup) ? initialGroup : "all");

        if (initialQ > 0) {
          const target = document.getElementById("q" + initialQ);
          if (target) target.scrollIntoView({ behavior: "smooth", block: "start" });
        }
      } catch (e) {
        root.innerHTML = `<section class="pde-hero"><h1>Failed to load</h1><p>${esc(e.message)}</p></section>`;
      }
    }
  </script>
</body>
</html>
