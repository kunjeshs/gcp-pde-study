<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#0e1114">
  <title>GCP PDE Study Hub</title>
  <link rel="stylesheet" href="assets/css/app.css?v=10">
  <link rel="stylesheet" href="assets/css/redesign.css?v=10">
  <link rel="stylesheet" href="assets/css/theme-toggle.css?v=10">
  <link rel="stylesheet" href="assets/css/overrides.css?v=10">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="assets/icons/icon-192.png">
</head>
<body>
  <div class="page">
    <header class="topbar" data-appbar></header>
    <main class="pde-wrap">
      <div id="root"><p class="muted">Loading…</p></div>
    </main>
  </div>

  <script type="module">
    import { boot } from "./assets/js/app.js";
    import { Data } from "./assets/js/data.js";

    if (boot()) {
      const esc = (s) => (s == null ? "" : String(s)).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");

      Promise.all([Data.chapters(), Data.topicsManifest()]).then(([cd, tm]) => {
        const chapters = cd.chapters || {};

        const heroHtml = `
          <section class="pde-hero">
            <p class="pde-eyebrow">Welcome</p>
            <h1>Learn, decide, drill.</h1>
            <p>Nineteen chapters of the official GCP Professional Data Engineer exam guide, plus Google's sample questions and scenario drills.</p>
            <a class="pde-cta" href="chapters.html">Open chapters →</a>
            <a class="pde-cta" href="exam-traps.html" style="background:transparent;color:var(--pde-accent);border:1px solid var(--pde-accent);margin-left:6px">Exam traps</a>
          </section>`;

        const allHtml = `
          <section>
            <h2>All chapters</h2>
            <div class="pde-cards">
              ${(tm.topics || []).map((t) => {
                const ch = chapters[t.topic] || {};
                return `
                <div class="pde-card">
                  <h3>${esc(t.topic)}</h3>
                  <p class="pde-card-meta">${ch.exam_weight ? esc(ch.exam_weight) + " weight" : ""}</p>
                  <a href="chapter.html?slug=${encodeURIComponent(t.slug)}">Open →</a>
                </div>`;
              }).join("")}
            </div>
          </section>`;

        document.getElementById("root").innerHTML = heroHtml + allHtml;

        if ("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js").catch(() => {});
      }).catch((err) => {
        document.getElementById("root").innerHTML =
          `<section class="pde-hero"><h1>Failed to load</h1><p>${esc(err.message)}</p></section>`;
      });
    }
  </script>
</body>
</html>
