<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#0e1114">
  <title>Weak Areas · GCP PDE Study Hub</title>
  <link rel="stylesheet" href="assets/css/app.css?v=9">
  <link rel="stylesheet" href="assets/css/redesign.css?v=9">
  <link rel="stylesheet" href="assets/css/theme-toggle.css?v=9">
  <link rel="stylesheet" href="assets/css/overrides.css?v=9">
</head>
<body>
  <div class="page">
    <header class="topbar" data-appbar></header>
    <main class="pde-wrap">
      <p class="eyebrow">Scorecard</p>
      <h1>Weak areas</h1>
      <p class="lead">Chapters ranked by your hit rate. Drill the weakest first.</p>
      <div id="list" class="pde-cards" style="margin-top:18px"></div>
    </main>
  </div>
  <script type="module">
    import { boot } from "./assets/js/app.js";
    import { Data } from "./assets/js/data.js";
    import { State } from "./assets/js/state.js";

    const esc = (s) => (s||"").toString().replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");

    (async () => {
      if (!boot()) return;
      const all = await Data.allQuestions();
      const attempts = State.getAttempts();
      const byTopic = new Map();
      for (const q of all) {
        const a = attempts[q.id];
        if (!a || !a.tries) continue;
        const cur = byTopic.get(q.topicSlug) || { topic: q.topic, slug: q.topicSlug, tries: 0, correct: 0 };
        cur.tries += a.tries; cur.correct += a.correct;
        byTopic.set(q.topicSlug, cur);
      }
      const rows = [...byTopic.values()].map((r) => ({ ...r, ratio: r.tries ? r.correct / r.tries : 0 }))
        .sort((a, b) => a.ratio - b.ratio);
      const list = document.getElementById("list");
      if (!rows.length) {
        list.innerHTML = `<div class="empty" style="grid-column:1/-1"><div class="big">∅</div>No attempts yet. Run a quiz first.</div>`;
        return;
      }
      list.innerHTML = rows.map((r) => {
        const cls = r.ratio >= 0.7 ? "status-live" : r.ratio < 0.4 ? "status-offline" : "";
        return `
          <div class="pde-card">
            <h3>${esc(r.topic)}</h3>
            <p class="pde-card-meta">
              <span class="badge ${cls}">${(r.ratio * 100).toFixed(0)}%</span>
              <span class="badge">${r.correct}/${r.tries}</span>
            </p>
            <a href="quiz.html?topic=${encodeURIComponent(r.slug)}&shuffle=1">Drill shuffled →</a>
          </div>`;
      }).join("");
    })();
  </script>
</body>
</html>
